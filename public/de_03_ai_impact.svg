  <text x="40" y="64" font-family="Inter, sans-serif" font-size="13" fill="#5C5F62">Baseline vs. optimierter Zustand nach Systemeinführung</text>
  <g transform="translate(60,100)">
    <text x="0" y="20" font-family="Inter, sans-serif" font-size="13" fill="#5C5F62" font-weight="600">Effizienz</text>
    <rect x="120" y="8" width="180" height="20" fill="#E2E2DC" rx="4"/>
    <rect x="120" y="8" width="120" height="20" fill="#40916C" rx="4"/>
