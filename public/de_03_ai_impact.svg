    <text x="0" y="160" font-family="Inter, sans-serif" font-size="13" fill="#5C5F62" font-weight="600">Kundenzufriedenheit</text>
    <rect x="120" y="148" width="200" height="20" fill="#E2E2DC" rx="4"/>
    <rect x="120" y="148" width="150" height="20" fill="#40916C" rx="4"/>
    <text x="340" y="162" font-family="Inter, sans-serif" font-size="12" fill="#5C5F62">Baseline 75%</text>
    <rect x="120" y="178" width="200" height="20" fill="#E2E2DC" rx="4"/>
    <rect x="120" y="178" width="190" height="20" fill="#1B4332" rx="4"/>
